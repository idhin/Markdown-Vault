services:
  markdown-vault:
    build:
      context: .
      network: host
    container_name: markdown-vault
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-to-a-random-secret-string}
      - ADMIN_WHITELIST_IPS=${ADMIN_WHITELIST_IPS:-}
    volumes:
      - vault-data:/app/data
      - vault-uploads:/app/uploads

volumes:
  vault-data:
  vault-uploads:
